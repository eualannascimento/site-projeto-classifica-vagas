<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-style="restraint" data-font="instrument" data-density="compact">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1c1c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="classificavagas.com - Plataforma de Vagas">
    <title>💼 classifica vagas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Serif+Display:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Splash -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-brand"><span class="brand-c">c</span>lassifica<span class="brand-v">v</span>agas</div>
            <div class="splash-loader-wrap">
                <div class="splash-loader"><div class="splash-progress" id="splashProgress"></div></div>
                <span class="splash-pct" id="splashPct">0%</span>
            </div>
            <p class="splash-msg" id="splashMsg">Iniciando...</p>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="app">

        <!-- Masthead -->
        <header class="top-app-bar">
            <div class="masthead-inner">
                <div class="masthead-brand">
                    <h1 class="brand-mark" id="brandLink" role="button" tabindex="0" style="cursor:pointer"><span class="brand-c">c</span>lassifica<span class="brand-v">v</span>agas</h1>
                    <div class="brand-meta">
                        <span class="job-count" id="jobCount">Carregando...</span>
                        <span class="brand-pulse"></span>
                        <span class="brand-update">atualizado <span id="lastUpdate">—</span></span>
                    </div>
                </div>
                <div class="top-app-bar-actions">
                    <button class="icon-btn" id="themeToggle" aria-label="Alternar tema">
                        <span class="material-symbols-rounded theme-icon-light">light_mode</span>
                        <span class="material-symbols-rounded theme-icon-dark">dark_mode</span>
                        <span class="material-symbols-rounded theme-icon-black">circle</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Mobile job count (line 2) -->
        <div class="mobile-jobcount-row">
            <span class="brand-pulse"></span>
            <span id="jobCountMobile">Carregando...</span>
        </div>

        <!-- Search -->
        <div class="search-bar-container">
            <div class="search-bar" id="searchBar">
                <span class="material-symbols-rounded search-icon">search</span>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar vagas, empresas, cargos... (pressione /)"
                    autocomplete="off"
                >
                <button class="icon-btn search-clear hidden" id="searchClear" aria-label="Limpar">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="filter-chips-container">
            <div class="filter-chips-scroll">
                <button class="filter-chip filter-chip-view" id="viewToggle" aria-label="Alternar visualização">
                    <span class="material-symbols-rounded">view_list</span>
                </button>

                <button class="filter-chip filter-chip-visited" id="visitedToggle" aria-pressed="false" aria-label="Visualizadas">
                    <span class="material-symbols-rounded">visibility</span>
                    <span class="visited-count" id="visitedCount"></span>
                </button>

                <div class="sort-dropdown-container">
                    <button class="filter-chip filter-chip-sort" id="sortToggle" aria-label="Ordenar">
                        <span class="material-symbols-rounded">swap_vert</span>
                        <span class="sort-label">Recentes</span>
                    </button>
                    <div class="sort-dropdown hidden" id="sortDropdown">
                        <button class="sort-option" data-sort="date_desc">Mais recentes</button>
                        <button class="sort-option" data-sort="date_asc">Mais antigas</button>
                        <button class="sort-option" data-sort="company_asc">Empresa A–Z</button>
                        <button class="sort-option" data-sort="company_desc">Empresa Z–A</button>
                        <button class="sort-option" data-sort="title_asc">Título A–Z</button>
                        <button class="sort-option" data-sort="title_desc">Título Z–A</button>
                    </div>
                </div>

                <button class="filter-chip filter-chip-main" id="openFilters">
                    <span class="material-symbols-rounded">filter_list</span>
                    <span>Filtros</span>
                    <span class="filter-badge hidden" id="filterBadge">0</span>
                </button>
            </div>
        </div>

        <!-- Active Filters -->
        <div class="active-filters hidden" id="activeFilters">
            <div class="active-filters-scroll" id="activeFiltersList"></div>
            <button class="clear-filters-btn" id="clearAllFilters">
                <span class="material-symbols-rounded">delete_sweep</span>
                Limpar
            </button>
            <div class="version-label">v2.1</div>
        </div>

        <!-- Content -->
        <main class="main-content">
            <div class="jobs-grid" id="jobsGrid"></div>

            <div class="loading-more hidden" id="loadingMore">
                <div class="loading-spinner"></div>
                <span>Carregando mais vagas...</span>
            </div>

            <div class="empty-state hidden" id="emptyState">
                <span class="material-symbols-rounded">search_off</span>
                <h3>Nenhuma vaga encontrada</h3>
                <p>Tente ajustar seus filtros ou termos de busca</p>
                <button class="filled-button" id="emptyStateClear">Limpar filtros</button>
            </div>
        </main>

        <!-- FAB -->
        <button class="fab" id="scrollTopFab" aria-label="Voltar ao topo">
            <span class="material-symbols-rounded">keyboard_arrow_up</span>
        </button>

        <!-- Scrim -->
        <div class="scrim hidden" id="scrim"></div>

        <!-- Filter Sheet -->
        <div class="bottom-sheet hidden" id="filterSheet">
            <div class="bottom-sheet-header">
                <div class="bottom-sheet-handle"></div>
                <div class="bottom-sheet-title">
                    <h2>Filtros</h2>
                    <span class="filter-count-label" id="sheetFilterCount">0 selecionados</span>
                </div>
                <button class="icon-btn" id="closeSheet" aria-label="Fechar">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <div class="bottom-sheet-content" id="filterSheetContent"></div>
            <div class="bottom-sheet-actions">
                <button class="text-button" id="sheetClearFilters">Limpar tudo</button>
                <button class="filled-button" id="sheetApplyFilters">
                    <span class="material-symbols-rounded">check</span>
                    Aplicar
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer-fixed">
            <p class="footer-quote">"Fortes razões fazem fortes ações" <span class="footer-quote-author">— Shakespeare</span></p>
        </footer>
    </div>

    <script src="assets/js/scripts.js"></script>
</body>
</html>
