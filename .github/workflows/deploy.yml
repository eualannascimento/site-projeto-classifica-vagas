name: Build and validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate open_jobs.json
        run: |
          python3 -c "
          import json
          from pathlib import Path
          p = Path('assets/data/json/open_jobs.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          assert isinstance(data, list), 'expected array'
          assert len(data) > 0, 'empty catalog'
          print(f'OK: {len(data)} jobs')
          "

      - name: Build catalog artifacts
        run: python3 scripts/build-catalog.py

      - name: Verify catalog artifacts
        run: |
          test -f assets/data/json/open_jobs.meta.json
          test -f assets/data/json/open_jobs.json.gz
          test -f assets/data/json/recent_jobs.json
          test -f assets/data/json/recent_jobs.json.gz
          python3 -c "
          import json
          from pathlib import Path
          meta = json.loads(Path('assets/data/json/open_jobs.meta.json').read_text(encoding='utf-8'))
          recent = json.loads(Path('assets/data/json/recent_jobs.json').read_text(encoding='utf-8'))
          assert meta.get('count', 0) > 0
          print(f'meta version={meta.get(\"version\")} count={meta.get(\"count\")}')
          print(f'recent_jobs: {len(recent)} jobs')
          "

      - name: Check no Google Fonts in HTML
        run: python3 scripts/check-no-google-fonts.py

      - name: Upload recent_jobs artifact
        uses: actions/upload-artifact@v4
        with:
          name: recent_jobs.json
          path: assets/data/json/recent_jobs.json
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
