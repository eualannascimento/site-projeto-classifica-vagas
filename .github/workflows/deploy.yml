name: Build and validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate open_jobs.json
        run: |
          python3 -c "
          import json
          from pathlib import Path
          p = Path('assets/data/json/open_jobs.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          assert isinstance(data, list), 'expected array'
          assert len(data) > 0, 'empty catalog'
          print(f'OK: {len(data)} jobs')
          "

      - name: Validate job schema
        run: python3 scripts/validate-jobs-schema.py

      - name: Build recent_jobs.json
        run: python3 scripts/build-recent.py

      - name: Build open_jobs.json.gz
        run: python3 scripts/build-gzip.py

      - name: Update sitemap lastmod
        run: python3 scripts/update-sitemap.py

      - name: Verify recent_jobs.json artifact
        run: |
          test -f assets/data/json/recent_jobs.json
          python3 -c "
          import json
          from pathlib import Path
          r = json.loads(Path('assets/data/json/recent_jobs.json').read_text(encoding='utf-8'))
          print(f'recent_jobs: {len(r)} jobs')
          "

      - name: Check no Google Fonts in HTML
        run: python3 scripts/check-no-google-fonts.py

      - name: Prepare deploy artifact
        run: python3 scripts/prepare-deploy.py

      - name: Upload recent_jobs artifact
        uses: actions/upload-artifact@v4
        with:
          name: recent_jobs.json
          path: assets/data/json/recent_jobs.json
          if-no-files-found: error

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dev dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Smoke test (Playwright)
        run: npm run test:e2e

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
